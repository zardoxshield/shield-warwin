<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shield Warwin · Login</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',-apple-system,sans-serif;background:#0a0a0a;min-height:100vh;display:flex;align-items:center;justify-content:center;color:#e6e6e6;background-image:radial-gradient(circle at 20% 30%, rgba(93,202,165,.08), transparent 50%),radial-gradient(circle at 80% 70%, rgba(93,200,236,.08), transparent 50%)}
.box{background:#0f0f0f;border:1px solid #1f1f1f;border-radius:12px;padding:40px 36px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.logo{font-size:32px;text-align:center;margin-bottom:6px}
h1{font-size:18px;font-weight:600;text-align:center;margin-bottom:6px;background:linear-gradient(90deg,#5DCAA5,#5dc8ec);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sub{color:#666;font-size:12px;text-align:center;margin-bottom:30px}
label{display:block;font-size:11px;color:#888;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
input{width:100%;padding:12px 14px;background:#0a0a0a;border:1px solid #1f1f1f;border-radius:8px;color:#e6e6e6;font-size:14px;outline:none;font-family:inherit;transition:border-color .15s}
input:focus{border-color:#5DCAA5}
.field{margin-bottom:18px}
.btn{width:100%;padding:13px;background:linear-gradient(180deg,#1D9E75,#0F6E56);border:none;border-radius:8px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;letter-spacing:.3px;transition:all .15s;margin-top:8px}
.btn:hover{background:linear-gradient(180deg,#22b386,#13805f);transform:translateY(-1px)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.erro{background:#3a1a1a;border:1px solid #5a2a2a;color:#ff8888;padding:10px 12px;border-radius:6px;font-size:12px;margin-bottom:16px;display:none}
.erro.show{display:block}
.foot{text-align:center;color:#444;font-size:10px;margin-top:24px;font-family:monospace}
</style>
</head>
<body>
<div class="box">
  <div class="logo">🛡️</div>
  <h1>Shield Warwin</h1>
  <div class="sub">Acesso restrito</div>
  <div class="erro" id="erro"></div>
  <div class="field">
    <label>Usuário</label>
    <input type="text" id="usuario" autocomplete="username" autofocus>
  </div>
  <div class="field">
    <label>Senha</label>
    <input type="password" id="senha" autocomplete="current-password" onkeydown="if(event.key==='Enter')entrar()">
  </div>
  <button class="btn" id="btn" onclick="entrar()">Entrar</button>
  <div class="foot">v2.0 · IDE Online</div>
</div>
<script>
async function entrar(){
  const u = document.getElementById('usuario').value.trim();
  const s = document.getElementById('senha').value;
  const erro = document.getElementById('erro');
  const btn = document.getElementById('btn');
  if(!u || !s){ erro.textContent = 'Preencha usuário e senha'; erro.classList.add('show'); return; }
  btn.disabled = true; btn.textContent = 'Entrando...'; erro.classList.remove('show');
  try {
    const r = await fetch('/api/login', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({usuario:u,senha:s})});
    const d = await r.json();
    if(d.ok){ location.href = '/'; }
    else { erro.textContent = d.erro || 'Falha no login'; erro.classList.add('show'); btn.disabled=false; btn.textContent='Entrar'; }
  } catch(e){ erro.textContent = 'Erro de conexão'; erro.classList.add('show'); btn.disabled=false; btn.textContent='Entrar'; }
}
</script>
</body>
</html>
