<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel Shield Warwin</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:sans-serif;background:#0f0f0f;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:2rem}
h1{font-size:2rem;color:#c9a84c}
.btn{padding:1.2rem 3rem;font-size:1.2rem;background:#c9a84c;color:#000;border:none;border-radius:8px;cursor:pointer;font-weight:bold;transition:all 0.3s}
.btn:hover{background:#e6c46a;transform:scale(1.05)}
.status{font-size:1rem;opacity:0.7;min-height:2rem}
</style>
</head>
<body>
<h1>🚀 Shield Warwin</h1>
<p style="opacity:0.6">Painel de Publicação</p>
<button class="btn" onclick="publicar()">📤 Publicar Site</button>
<p class="status" id="status">Pronto para publicar!</p>
<script>
async function publicar() {
  document.getElementById('status').textContent = '⏳ Publicando...';
  const res = await fetch('/publicar');
  const txt = await res.text();
  document.getElementById('status').textContent = txt.includes('sucesso') ? '✅ Publicado com sucesso!' : '❌ Erro: ' + txt;
}
</script>
</body>
</html>
