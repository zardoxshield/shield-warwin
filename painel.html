<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shield Warwin IDE</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Courier New',monospace;background:#0f0f0f;color:#e0e0e0;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:#1a1a1a;border-bottom:1px solid #2a2a2a;flex-shrink:0}
.logo{font-size:15px;font-weight:bold;color:#5DCAA5}
.topbar-btns{display:flex;gap:8px}
.btn-novo{padding:6px 14px;background:#1D9E75;color:#fff;border:none;border-radius:5px;cursor:pointer;font-size:12px;font-weight:bold}
.btn-pub{padding:6px 14px;background:#378ADD;color:#fff;border:none;border-radius:5px;cursor:pointer;font-size:12px;font-weight:bold}
.btn-pub:disabled{opacity:0.5;cursor:not-allowed}
.abas{display:flex;align-items:center;background:#141414;border-bottom:1px solid #2a2a2a;overflow-x:auto;flex-shrink:0}
.aba{display:flex;align-items:center;gap:6px;padding:7px 14px;font-size:12px;color:#666;cursor:pointer;border-right:1px solid #2a2a2a;white-space:nowrap;font-family:sans-serif}
.aba:hover{color:#ccc;background:#1a1a1a}
.aba.active{color:#e0e0e0;background:#1a1a1a;border-top:2px solid #5DCAA5}
.aba-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.main{display:flex;flex:1;min-height:0}
.sidebar{width:180px;background:#141414;border-right:1px solid #2a2a2a;padding:10px 0;overflow-y:auto;flex-shrink:0}
.sidebar-label{font-size:10px;color:#555;padding:6px 12px;text-transform:uppercase;letter-spacing:0.1em;font-family:sans-serif}
.file-item{display:flex;align-items:center;gap:8px;padding:5px 12px;font-size:12px;color:#888;cursor:pointer}
.file-item:hover,.file-item.active{background:#1e1e1e;color:#e0e0e0}
.fdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.center{flex:1;display:flex;flex-direction:column;min-width:0}
.editor{flex:1;padding:16px;background:#1a1a1a;font-size:13px;line-height:1.7;overflow-y:auto;outline:none;color:#c9d1d9;min-height:0;resize:none;border:none;font-family:'Courier New',monospace}
.terminal{height:120px;background:#0d0d0d;padding:10px 16px;font-size:12px;color:#5DCAA5;overflow-y:auto;border-top:1px solid #2a2a2a;flex-shrink:0}
.t-err{color:#F09595}.t-ok{color:#5DCAA5}.t-muted{color:#555}.t-cmd{color:#EF9F27}
.term-input-area{display:flex;gap:6px;padding:6px 16px;background:#0d0d0d;border-top:1px solid #1a1a1a;flex-shrink:0;align-items:center}
.term-prompt{color:#555;font-size:12px}
.term-input{flex:1;background:transparent;border:none;color:#5DCAA5;font-family:'Courier New',monospace;font-size:12px;outline:none}
.run-btn{padding:4px 12px;background:#1D9E75;border:none;border-radius:4px;color:#fff;font-size:11px;cursor:pointer;font-family:sans-serif}
.ai-panel{width:220px;background:#141414;border-left:1px solid #2a2a2a;display:flex;flex-direction:column;flex-shrink:0}
.ai-header{font-size:10px;color:#555;padding:8px 12px;border-bottom:1px solid #2a2a2a;font-family:sans-serif;text-transform:uppercase;letter-spacing:0.08em}
.suggestions{flex:1;overflow-y:auto;padding:6px;display:flex;flex-direction:column;gap:4px}
.sug{font-family:sans-serif;font-size:11px;text-align:left;padding:7px 10px;border-radius:5px;border:1px solid #2a2a2a;background:#1a1a1a;color:#bbb;cursor:pointer;line-height:1.4;width:100%}
.sug:hover{border-color:#5DCAA5;color:#fff}
.sug-cat{font-size:9px;color:#5DCAA5;display:block;margin-bottom:2px;text-transform:uppercase;letter-spacing:0.06em}
.statusbar{display:flex;align-items:center;gap:16px;padding:3px 16px;background:#1a1a1a;border-top:1px solid #2a2a2a;font-size:10px;color:#555;font-family:sans-serif;flex-shrink:0}
.sdot{width:6px;height:6px;border-radius:50%;background:#1D9E75;display:inline-block;margin-right:4px}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;align-items:center;justify-content:center}
.modal.open{display:flex}
.modal-box{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;padding:24px;width:360px}
.modal-title{font-family:sans-serif;font-size:15px;font-weight:bold;color:#5DCAA5;margin-bottom:16px}
.modal-label{font-family:sans-serif;font-size:11px;color:#666;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.06em}
.modal-input{width:100%;padding:8px 10px;background:#0f0f0f;border:1px solid #2a2a2a;border-radius:5px;color:#e0e0e0;font-size:13px;margin-bottom:14px;font-family:'Courier New',monospace}
.modal-input:focus{outline:none;border-color:#5DCAA5}
.tipos{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:16px}
.tipo-btn{padding:8px 4px;background:#0f0f0f;border:1px solid #2a2a2a;border-radius:5px;color:#888;font-size:11px;cursor:pointer;font-family:sans-serif;text-align:center}
.tipo-btn:hover,.tipo-btn.sel{border-color:#5DCAA5;color:#5DCAA5;background:#0f1f1a}
.modal-btns{display:flex;gap:8px;justify-content:flex-end}
.modal-cancel{padding:7px 14px;background:transparent;border:1px solid #2a2a2a;border-radius:5px;color:#666;font-size:12px;cursor:pointer;font-family:sans-serif}
.modal-ok{padding:7px 14px;background:#1D9E75;border:none;border-radius:5px;color:#fff;font-size:12px;cursor:pointer;font-family:sans-serif;font-weight:bold}
</style>
</head>
<body>
<div class="topbar">
  <span class="logo">🚀 Shield Warwin IDE</span>
  <div class="topbar-btns">
    <button class="btn-novo" onclick="abrirModal()">+ Novo Projeto</button>
    <button class="btn-pub" id="publishBtn" onclick="publicar()">⬆ Publicar</button>
  </div>
</div>
<div class="abas" id="abas">
  <div class="aba active" data-projeto="__painel__" onclick="selectAba(this,'__painel__')">
    <div class="aba-dot" style="background:#5DCAA5"></div>Painel
  </div>
</div>
<div class="main">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-label">Arquivos</div>
    <div class="file-item" onclick="selectFile(this,'index.html')"><div class="fdot" style="background:#E24B4A"></div>index.html</div>
    <div class="file-item" onclick="selectFile(this,'painel.html')"><div class="fdot" style="background:#E24B4A"></div>painel.html</div>
    <div class="file-item" onclick="selectFile(this,'servidor.js')"><div class="fdot" style="background:#EF9F27"></div>servidor.js</div>
    <div class="file-item" onclick="selectFile(this,'Dockerfile')"><div class="fdot" style="background:#378ADD"></div>Dockerfile</div>
  </div>
  <div class="center">
    <textarea class="editor" id="editor" spellcheck="false">// Selecione um arquivo à esquerda</textarea>
    <div class="terminal" id="terminal">
      <div class="t-muted">$ Shield Warwin IDE iniciado</div>
      <div class="t-ok">✓ Servidor online · porta 9999</div>
      <div class="t-muted">$ aguardando...</div>
    </div>
    <div class="term-input-area">
      <span class="term-prompt">$</span>
      <input class="term-input" id="termInput" placeholder="npm install express / python3 main.py / ls ..." onkeydown="if(event.key==='Enter')executarComando()"/>
      <button class="run-btn" onclick="executarArquivoAtual()">▶ Executar</button>
    </div>
  </div>
  <div class="ai-panel">
    <div class="ai-header">✦ Próximos passos</div>
    <div class="suggestions">
      <button class="sug" onclick="dica('auth')"><span class="sug-cat">Segurança</span>Login de usuário</button>
      <button class="sug" onclick="dica('api')"><span class="sug-cat">Backend</span>Criar API REST</button>
      <button class="sug" onclick="dica('db')"><span class="sug-cat">Banco de dados</span>Conectar SQLite</button>
      <button class="sug" onclick="dica('css')"><span class="sug-cat">Frontend</span>Melhorar CSS</button>
      <button class="sug" onclick="dica('ws')"><span class="sug-cat">Tempo real</span>WebSocket</button>
      <button class="sug" onclick="dica('env')"><span class="sug-cat">Deploy</span>Variáveis de ambiente</button>
      <button class="sug" onclick="dica('upload')"><span class="sug-cat">Funcionalidade</span>Upload de arquivos</button>
      <button class="sug" onclick="dica('log')"><span class="sug-cat">Monitoramento</span>Adicionar logs</button>
      <button class="sug" onclick="dica('dominio')"><span class="sug-cat">Publicar</span>Colocar domínio</button>
    </div>
  </div>
</div>
<div class="statusbar">
  <span><span class="sdot"></span>Online</span>
  <span id="statusFile">painel</span>
  <span>Node.js v18 · Docker · Coolify</span>
</div>
<div class="modal" id="modal">
  <div class="modal-box">
    <div class="modal-title">+ Novo Projeto</div>
    <div class="modal-label">Nome do projeto</div>
    <input class="modal-input" id="nomeProj" placeholder="meu-site"/>
    <div class="modal-label">Tipo</div>
    <div class="tipos">
      <button class="tipo-btn sel" data-tipo="site" onclick="selTipo(this)">🌐 Site</button>
      <button class="tipo-btn" data-tipo="landing" onclick="selTipo(this)">🚀 Landing</button>
      <button class="tipo-btn" data-tipo="api" onclick="selTipo(this)">⚡ API</button>
      <button class="tipo-btn" data-tipo="python" onclick="selTipo(this)">🐍 Python</button>
      <button class="tipo-btn" data-tipo="cpp" onclick="selTipo(this)">⚙ C++</button>
      <button class="tipo-btn" data-tipo="java" onclick="selTipo(this)">☕ Java</button>
    </div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="fecharModal()">Cancelar</button>
      <button class="modal-ok" onclick="criarProjeto()">Criar Projeto</button>
    </div>
  </div>
</div>
<script>
let abaAtiva='__painel__',tipoSel='site',projetos={};

const dicas={
  auth:['── Login de usuário ──','$ npm install express-session bcrypt','✓ Senha criptografada com bcrypt','✓ Sessão mantida com express-session'],
  api:['── API REST ──','// GET /api/items → lista','// POST /api/items → cria','✓ Teste: curl http://localhost:9999/api/items'],
  db:['── Banco SQLite ──','$ npm install better-sqlite3','const db = new Database("/app/dados.db");','✓ Dados persistem entre deploys'],
  css:['── CSS Moderno ──','<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">','body { font-family: Inter, sans-serif; }','✓ Layout responsivo pronto'],
  ws:['── WebSocket ──','$ npm install ws','const wss = new WebSocket.Server({ port: 8080 });','✓ Chat em tempo real!'],
  env:['── Variáveis de Ambiente ──','// Coolify: Configuration > Environment Variables','const chave = process.env.MINHA_CHAVE;','✓ Nunca coloque senhas no código!'],
  upload:['── Upload de Arquivos ──','$ npm install multer','const upload = multer({ dest: "/app/uploads/" });','✓ Arquivos salvos em /app/uploads/'],
  log:['── Logs ──','fs.appendFileSync("/app/servidor.log", msg);','✓ Veja logs no Coolify > Logs'],
  dominio:['── Publicar com Domínio ──','1. Compre um domínio','2. DNS → IP: 177.7.34.15','3. Coolify: Configuration > Domains','✓ HTTPS automático!']
};

function dica(key){
  dicas[key].forEach(l=>addLog(l,l.startsWith('──')?'t-muted':l.startsWith('$')||l.startsWith('//')||/^\d/.test(l)?'t-cmd':'t-ok'));
  addLog('─────────────','t-muted');
}

function addLog(msg,cls='t-muted'){
  const t=document.getElementById('terminal');
  const d=document.createElement('div');
  d.className=cls;d.textContent=msg;
  t.appendChild(d);t.scrollTop=t.scrollHeight;
}

function selectFile(el,nome){
  document.querySelectorAll('.file-item').forEach(e=>e.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('statusFile').textContent=nome;
  addLog('$ cat '+nome,'t-muted');
  const url=abaAtiva==='__painel__'?'/arquivo?nome='+nome:'/projetos/arquivo?projeto='+abaAtiva+'&arquivo='+nome;
  fetch(url).then(r=>r.text()).then(txt=>{
    document.getElementById('editor').value=txt;
    addLog('✓ '+nome+' carregado','t-ok');
  }).catch(()=>addLog('✗ Erro ao carregar '+nome,'t-err'));
}

function selectAba(el,projeto){
  document.querySelectorAll('.aba').forEach(e=>e.classList.remove('active'));
  el.classList.add('active');
  abaAtiva=projeto;
  document.getElementById('statusFile').textContent=projeto;
  atualizarSidebar(projeto);
}

function atualizarSidebar(projeto){
  const sb=document.getElementById('sidebar');
  if(projeto==='__painel__'){
    sb.innerHTML='<div class="sidebar-label">Arquivos</div>'+
      ['index.html','painel.html','servidor.js','Dockerfile'].map(f=>
        `<div class="file-item" onclick="selectFile(this,'${f}')"><div class="fdot" style="background:${f.endsWith('.html')?'#E24B4A':f.endsWith('.js')?'#EF9F27':'#378ADD'}"></div>${f}</div>`
      ).join('');
  } else {
    const p=projetos[projeto];
    if(!p)return;
    const tipos={site:['index.html'],api:['index.js','README.md'],python:['main.py','README.md'],cpp:['main.cpp','README.md'],java:['Main.java','README.md'],landing:['index.html']};
    const arquivos=tipos[p.tipo]||['index.html'];
    sb.innerHTML=`<div class="sidebar-label">${projeto}</div>`+
      arquivos.map(f=>
        `<div class="file-item" onclick="selectFile(this,'${f}')"><div class="fdot" style="background:${f.endsWith('.html')?'#E24B4A':f.endsWith('.js')||f.endsWith('.py')?'#EF9F27':'#378ADD'}"></div>${f}</div>`
      ).join('')+
      `<div style="padding:8px 12px;margin-top:8px;display:flex;flex-direction:column;gap:4px">
        <button onclick="verProjeto('${projeto}')" style="width:100%;padding:5px;background:#1D9E75;border:none;border-radius:4px;color:#fff;font-size:11px;cursor:pointer;font-family:sans-serif">🌐 Visualizar</button>
      </div>`;
  }
}

function verProjeto(nome){window.open('/projetos/ver/'+nome,'_blank');}

function abrirModal(){document.getElementById('modal').classList.add('open');document.getElementById('nomeProj').focus();}
function fecharModal(){document.getElementById('modal').classList.remove('open');}
function selTipo(el){document.querySelectorAll('.tipo-btn').forEach(e=>e.classList.remove('sel'));el.classList.add('sel');tipoSel=el.dataset.tipo;}

function criarProjeto(){
  const nome=document.getElementById('nomeProj').value.trim().replace(/[^a-z0-9-_]/gi,'-').toLowerCase();
  if(!nome){addLog('✗ Digite um nome','t-err');return;}
  addLog('$ Criando projeto "'+nome+'" ('+tipoSel+')...','t-muted');
  fetch('/projetos/criar',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({nome,tipo:tipoSel})})
    .then(r=>r.json()).then(data=>{
      if(data.ok){projetos[nome]={nome,tipo:tipoSel};addAba(nome,tipoSel);addLog('✓ Projeto "'+nome+'" criado!','t-ok');fecharModal();document.getElementById('nomeProj').value='';}
      else addLog('✗ '+data.mensagem,'t-err');
    }).catch(e=>addLog('✗ '+e.message,'t-err'));
}

function addAba(nome,tipo){
  const cores={site:'#E24B4A',api:'#EF9F27',python:'#5DCAA5',cpp:'#378ADD',java:'#EF9F27',landing:'#D4537E'};
  const icones={site:'🌐',api:'⚡',python:'🐍',cpp:'⚙',java:'☕',landing:'🚀'};
  const abas=document.getElementById('abas');
  const aba=document.createElement('div');
  aba.className='aba';aba.dataset.projeto=nome;
  aba.innerHTML=`<div class="aba-dot" style="background:${cores[tipo]||'#5DCAA5'}"></div>${icones[tipo]||'📁'} ${nome}<span style="color:#555;font-size:14px;padding:0 2px;margin-left:4px" onclick="fecharAba(event,'${nome}')">×</span>`;
  aba.onclick=function(e){if(e.target.tagName!=='SPAN')selectAba(this,nome);};
  abas.appendChild(aba);selectAba(aba,nome);
}

function fecharAba(e,nome){
  e.stopPropagation();
  const aba=document.querySelector(`.aba[data-projeto="${nome}"]`);
  if(aba)aba.remove();
  delete projetos[nome];
  const primeira=document.querySelector('.aba');
  if(primeira)selectAba(primeira,'__painel__');
}

function publicar(){
  const btn=document.getElementById('publishBtn');
  btn.disabled=true;btn.textContent='Publicando...';
  addLog('$ publicando...','t-muted');
  fetch('/publicar').then(r=>r.text()).then(txt=>{
    addLog('✓ '+txt,'t-ok');btn.textContent='⬆ Publicar';btn.disabled=false;
  }).catch(e=>{addLog('✗ '+e.message,'t-err');btn.textContent='⬆ Publicar';btn.disabled=false;});
}

function executarArquivoAtual(){
  const arquivo=document.getElementById('statusFile').textContent;
  if(!arquivo||arquivo==='painel'||abaAtiva==='__painel__'){addLog('✗ Selecione um projeto e arquivo','t-err');return;}
  addLog('$ Executando '+arquivo+'...','t-muted');
  fetch('/projetos/executar',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({projeto:abaAtiva,arquivo})})
    .then(r=>r.json()).then(data=>{
      data.saida.split('\n').forEach(l=>{if(l.trim())addLog(l,data.ok?'t-ok':'t-err');});
    }).catch(e=>addLog('✗ '+e.message,'t-err'));
}

function executarComando(){
  const input=document.getElementById('termInput');
  const cmd=input.value.trim();
  if(!cmd)return;
  input.value='';
  addLog('$ '+cmd,'t-cmd');
  if(cmd==='clear'){document.getElementById('terminal').innerHTML='';return;}
  if(cmd==='help'){
    ['Comandos disponíveis:','  npm install [pacote]','  node [arquivo]','  python3 [arquivo]','  g++ [arquivo]','  ls — listar arquivos','  clear — limpar terminal','  ▶ Executar — roda arquivo aberto'].forEach(l=>addLog(l,'t-muted'));
    return;
  }
  fetch('/cmd',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({cmd,projeto:abaAtiva!=='__painel__'?abaAtiva:null})})
    .then(r=>r.json()).then(data=>{
      data.saida.split('\n').forEach(l=>{if(l.trim())addLog(l,data.ok?'t-ok':'t-err');});
    }).catch(e=>addLog('✗ '+e.message,'t-err'));
}

document.getElementById('editor').addEventListener('input',function(){
  clearTimeout(window._saveTimer);
  window._saveTimer=setTimeout(()=>{
    const arquivo=document.getElementById('statusFile').textContent;
    if(!arquivo||arquivo==='painel'||abaAtiva==='__painel__')return;
    fetch('/projetos/salvar',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({projeto:abaAtiva,arquivo,conteudo:document.getElementById('editor').value})})
      .then(r=>r.json()).then(data=>{if(data.ok)addLog('✓ '+arquivo+' salvo','t-ok');});
  },1500);
});

fetch('/projetos/listar').then(r=>r.json()).then(lista=>{
  lista.forEach(p=>{projetos[p.nome]=p;addAba(p.nome,p.tipo);});
}).catch(()=>{});
</script>
</body>
</html>
<style id="termPro">
.terminal-wrap{display:flex;flex-direction:column;background:#0a0a0a;border:1px solid #1f1f1f;border-radius:8px;overflow:hidden;font-family:'JetBrains Mono','Fira Code','Courier New',monospace}
.term-header{display:flex;align-items:center;gap:8px;padding:8px 14px;background:linear-gradient(180deg,#1a1a1a,#0f0f0f);border-bottom:1px solid #1f1f1f}
.term-dot{width:12px;height:12px;border-radius:50%}
.term-dot.r{background:#ff5f56;box-shadow:inset 0 0 0 1px #e0443e}
.term-dot.y{background:#ffbd2e;box-shadow:inset 0 0 0 1px #dea123}
.term-dot.g{background:#27c93f;box-shadow:inset 0 0 0 1px #1aab29}
.term-title{flex:1;text-align:center;color:#888;font-size:11px;letter-spacing:.5px;font-family:sans-serif}
.term-body{flex:1;background:#0a0a0a;padding:10px 14px;overflow-y:auto;font-size:12.5px;line-height:1.55;color:#e6e6e6;min-height:200px}
.term-body::-webkit-scrollbar{width:6px}
.term-body::-webkit-scrollbar-track{background:transparent}
.term-body::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:3px}
.term-body::-webkit-scrollbar-thumb:hover{background:#3a3a3a}
.term-line{padding:1px 0;white-space:pre-wrap;word-break:break-word}
.term-line.t-cmd{color:#e6e6e6}
.term-line.t-ok{color:#5DCAA5}
.term-line.t-err{color:#ff6b6b}
.term-line.t-muted{color:#666}
.term-line.t-info{color:#5dc8ec}
.term-line.t-warn{color:#ffbd2e}
.term-prompt{color:#5DCAA5;font-weight:600}
.term-at{color:#888}
.term-host{color:#5dc8ec;font-weight:600}
.term-path{color:#ffbd2e}
.term-sym{color:#e6e6e6;margin-right:6px}
.term-input-line{display:flex;align-items:center;padding:6px 14px;background:#0a0a0a;border-top:1px solid #1a1a1a;gap:8px}
.term-input-prefix{display:flex;align-items:center;gap:0;font-size:12.5px;font-family:'JetBrains Mono','Fira Code','Courier New',monospace;white-space:nowrap}
.term-input-pro{flex:1;background:transparent;border:none;color:#e6e6e6;font-family:'JetBrains Mono','Fira Code','Courier New',monospace;font-size:12.5px;outline:none;caret-color:#5DCAA5}
.term-cursor{display:inline-block;width:8px;height:14px;background:#5DCAA5;animation:blink 1s steps(1) infinite;vertical-align:middle;margin-left:2px}
@keyframes blink{50%{opacity:0}}
.term-run-btn{padding:5px 14px;background:linear-gradient(180deg,#1D9E75,#0F6E56);border:1px solid #0F6E56;border-radius:5px;color:#fff;font-size:11px;cursor:pointer;font-family:sans-serif;font-weight:600;letter-spacing:.3px;transition:all .15s}
.term-run-btn:hover{background:linear-gradient(180deg,#22b386,#13805f);transform:translateY(-1px)}
.term-run-btn:active{transform:translateY(0)}
.term-hint{color:#444;font-size:10px;font-family:sans-serif;padding:2px 14px;background:#080808;border-top:1px solid #141414}
.term-hint kbd{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:3px;padding:1px 5px;color:#888;font-size:10px;font-family:monospace}
</style>

<script>
(function(){
  // Substitui o terminal antigo pelo novo após o DOM carregar
  function upgradeTerminal(){
    const oldTerm = document.getElementById('terminal') || document.querySelector('.terminal');
    if(!oldTerm) return setTimeout(upgradeTerminal, 200);

    // Cria estrutura nova
    const wrap = document.createElement('div');
    wrap.className = 'terminal-wrap';
    wrap.innerHTML = `
      <div class="term-header">
        <div class="term-dot r"></div>
        <div class="term-dot y"></div>
        <div class="term-dot g"></div>
        <div class="term-title">shield@warwin: ~</div>
      </div>
      <div class="term-body" id="terminal"></div>
      <div class="term-input-line">
        <div class="term-input-prefix">
          <span class="term-prompt">shield</span><span class="term-at">@</span><span class="term-host">warwin</span><span class="term-sym">:</span><span class="term-path" id="termPath">~</span><span class="term-sym">$</span>
        </div>
        <input class="term-input-pro" id="termInput" autocomplete="off" spellcheck="false" placeholder="digite um comando — 'help' pra ver tudo"/>
        <button class="term-run-btn" onclick="executarArquivoAtual()">▶ Executar</button>
      </div>
      <div class="term-hint">
        <kbd>↑</kbd> <kbd>↓</kbd> histórico &nbsp;·&nbsp; <kbd>Tab</kbd> autocompletar &nbsp;·&nbsp; <kbd>Ctrl</kbd>+<kbd>L</kbd> limpar &nbsp;·&nbsp; <kbd>Ctrl</kbd>+<kbd>C</kbd> cancelar
      </div>
    `;

    // Substitui o antigo
    const parent = oldTerm.parentElement;
    // remove input area antiga se existir
    const oldInput = parent.querySelector('.terminal-input-area');
    if(oldInput) oldInput.remove();
    parent.replaceChild(wrap, oldTerm);

    // Atualiza path conforme aba ativa
    const pathEl = document.getElementById('termPath');
    const obs = new MutationObserver(()=>{
      if(typeof abaAtiva !== 'undefined'){
        pathEl.textContent = abaAtiva && abaAtiva !== '__painel__' ? '~/'+abaAtiva : '~';
      }
    });
    obs.observe(document.body,{subtree:true,attributes:true,attributeFilter:['class']});
    setInterval(()=>{
      if(typeof abaAtiva !== 'undefined'){
        pathEl.textContent = abaAtiva && abaAtiva !== '__painel__' ? '~/'+abaAtiva : '~';
      }
    }, 500);

    // Histórico
    const historico = JSON.parse(localStorage.getItem('term_hist')||'[]');
    let histIdx = historico.length;
    const COMANDOS = ['help','clear','ls','pwd','npm install','npm run','node','python3','g++','java','cat','echo','mkdir','ls projetos'];

    const input = document.getElementById('termInput');

    input.addEventListener('keydown', function(e){
      if(e.key === 'ArrowUp'){
        e.preventDefault();
        if(historico.length === 0) return;
        histIdx = Math.max(0, histIdx-1);
        input.value = historico[histIdx] || '';
        setTimeout(()=>input.setSelectionRange(input.value.length, input.value.length), 0);
      } else if(e.key === 'ArrowDown'){
        e.preventDefault();
        histIdx = Math.min(historico.length, histIdx+1);
        input.value = historico[histIdx] || '';
      } else if(e.key === 'Tab'){
        e.preventDefault();
        const v = input.value.trim();
        if(!v) return;
        const match = COMANDOS.find(c => c.startsWith(v));
        if(match) input.value = match + ' ';
      } else if(e.key === 'Enter'){
        const cmd = input.value.trim();
        if(cmd){
          historico.push(cmd);
          if(historico.length > 100) historico.shift();
          localStorage.setItem('term_hist', JSON.stringify(historico));
          histIdx = historico.length;
        }
        executarComandoPro();
      } else if((e.ctrlKey || e.metaKey) && e.key === 'l'){
        e.preventDefault();
        document.getElementById('terminal').innerHTML = '';
      } else if((e.ctrlKey || e.metaKey) && e.key === 'c'){
        if(!window.getSelection().toString()){
          e.preventDefault();
          addLog('^C', 't-muted');
          input.value = '';
        }
      }
    });

    // Banner inicial
    addLog('╭─────────────────────────────────────────╮','t-info');
    addLog('│  Shield Warwin Terminal Pro v2.0        │','t-info');
    addLog('│  Digite "help" para ver os comandos     │','t-info');
    addLog('╰─────────────────────────────────────────╯','t-info');
    addLog('','t-muted');
  }

  // Função addLog melhorada (sobrescreve)
  window.addLog = function(texto, classe){
    const term = document.getElementById('terminal');
    if(!term) return;
    const linha = document.createElement('div');
    linha.className = 'term-line ' + (classe || 't-cmd');
    if(classe === 't-cmd' && texto.startsWith('$ ')){
      // Renderiza prompt colorido para comandos
      const cmd = texto.slice(2);
      linha.innerHTML = `<span class="term-prompt">shield</span><span class="term-at">@</span><span class="term-host">warwin</span>:<span class="term-path">${(typeof abaAtiva!=='undefined' && abaAtiva && abaAtiva!=='__painel__')?'~/'+abaAtiva:'~'}</span>$ <span style="color:#e6e6e6">${cmd.replace(/</g,'&lt;')}</span>`;
    } else {
      linha.textContent = texto;
    }
    term.appendChild(linha);
    term.scrollTop = term.scrollHeight;
  };

  // Função executar comando profissional
  window.executarComandoPro = function(){
    const input = document.getElementById('termInput');
    const cmd = input.value.trim();
    if(!cmd) return;
    input.value = '';
    addLog('$ ' + cmd, 't-cmd');

    if(cmd === 'clear' || cmd === 'cls'){
      document.getElementById('terminal').innerHTML = '';
      return;
    }
    if(cmd === 'help'){
      [
        'Comandos disponíveis:',
        '  help              — mostra esta ajuda',
        '  clear / cls       — limpa o terminal',
        '  ls projetos       — lista todos os projetos',
        '  npm install <pkg> — instala pacote npm',
        '  node <arquivo>    — executa arquivo node',
        '  python3 <arquivo> — executa arquivo python',
        '  g++ <arquivo>     — compila C++',
        '  ▶ Executar        — roda o arquivo aberto',
        '',
        'Atalhos: ↑/↓ histórico · Tab autocomplete · Ctrl+L limpar'
      ].forEach(l => addLog(l, 't-muted'));
      return;
    }
    if(cmd === 'ls projetos'){
      fetch('/projetos/listar').then(r=>r.json()).then(d=>{
        if(!d.length) addLog('  (nenhum projeto ainda)', 't-muted');
        else d.forEach(p => addLog('  📁 ' + p.nome + '  ' + '·  '.padStart(20-p.nome.length,' ') + p.tipo, 't-info'));
      }).catch(e => addLog('✗ ' + e.message, 't-err'));
      return;
    }
    if(cmd === 'pwd'){
      const p = (typeof abaAtiva!=='undefined' && abaAtiva && abaAtiva!=='__painel__') ? '/app/projetos/'+abaAtiva : '/app';
      addLog(p, 't-info');
      return;
    }

    // Manda pro backend
    fetch('/cmd', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({cmd, projeto: (typeof abaAtiva!=='undefined' && abaAtiva!=='__painel__') ? abaAtiva : null})
    })
    .then(r => r.json())
    .then(data => {
      const linhas = (data.saida || '').split('\n');
      linhas.forEach(l => { if(l.trim()) addLog(l, data.ok ? 't-ok' : 't-err'); });
      if(!linhas.some(l=>l.trim())) addLog(data.ok ? '✓ executado' : '✗ falhou', data.ok ? 't-ok' : 't-err');
    })
    .catch(e => addLog('✗ ' + e.message, 't-err'));
  };

  // Sobrescreve a função antiga
  window.executarComando = window.executarComandoPro;

  // Roda quando o DOM tiver pronto
  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', upgradeTerminal);
  } else {
    upgradeTerminal();
  }
})();
</script>
<style id="termAbas">
.term-tabs-bar{display:flex;align-items:center;background:#0a0a0a;border-bottom:1px solid #1a1a1a;padding:0 8px;gap:2px;overflow-x:auto;flex-shrink:0}
.term-tabs-bar::-webkit-scrollbar{height:0}
.term-tab{display:flex;align-items:center;gap:6px;padding:6px 10px 6px 12px;background:#0f0f0f;border:1px solid transparent;border-bottom:none;border-radius:6px 6px 0 0;font-family:'JetBrains Mono','Fira Code',monospace;font-size:11px;color:#888;cursor:pointer;white-space:nowrap;margin-top:4px;transition:all .15s}
.term-tab:hover{background:#161616;color:#bbb}
.term-tab.active{background:#0a0a0a;color:#5DCAA5;border-color:#1f1f1f}
.term-tab-status{width:8px;height:8px;border-radius:50%;background:#444;flex-shrink:0}
.term-tab-status.running{background:#ffbd2e;animation:pulse 1.2s infinite}
.term-tab-status.idle{background:#27c93f}
.term-tab-status.error{background:#ff5f56}
.term-tab-status.input{background:#5dc8ec;animation:pulse .6s infinite}
@keyframes pulse{50%{opacity:.4}}
.term-tab-close{color:#555;padding:0 2px;border-radius:3px;font-size:14px;line-height:1}
.term-tab-close:hover{background:#2a1a1a;color:#ff5f56}
.term-tab-add{padding:6px 12px;color:#666;cursor:pointer;font-size:14px;font-weight:600}
.term-tab-add:hover{color:#5DCAA5}
.term-input-line.waiting-input .term-input-prefix{color:#5dc8ec !important}
.term-input-line.waiting-input::before{content:'⌨ aguardando input ';color:#5dc8ec;font-size:10px;font-family:sans-serif;margin-right:8px;animation:pulse 1s infinite}
.term-kill-btn{padding:5px 10px;background:#3a1a1a;border:1px solid #5a2a2a;border-radius:5px;color:#ff8888;font-size:11px;cursor:pointer;font-family:sans-serif;font-weight:600;display:none}
.term-kill-btn:hover{background:#5a2a2a;color:#fff}
.term-kill-btn.show{display:block}
.term-line.t-stdout{color:#e6e6e6}
.term-line.t-stderr{color:#ff8888}
.term-line.t-exit{color:#666;font-style:italic;border-top:1px dashed #1f1f1f;padding-top:4px;margin-top:4px}
.term-line.t-exit.ok{color:#5DCAA5}
.term-line.t-exit.fail{color:#ff6b6b}
</style>

<script>
(function(){
  // Estado das abas
  const TabState = {
    abas: [], // {id, nome, output:[], hist:[], histIdx:0, status:'idle', currentSession:null, esperandoInput:false}
    ativa: null,

    nova(nome){
      const id = 't' + Date.now() + Math.random().toString(36).slice(2,5);
      this.abas.push({
        id, nome: nome || ('terminal ' + (this.abas.length+1)),
        output: [],
        hist: JSON.parse(localStorage.getItem('term_hist_'+id) || '[]'),
        histIdx: 0,
        status: 'idle',
        currentSession: null,
        esperandoInput: false
      });
      this.ativa = id;
      this.render();
    },
    fechar(id){
      const aba = this.abas.find(a=>a.id===id);
      if(aba && aba.currentSession){
        // mata o processo
        fetch('/cmd-kill', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sessionId:aba.currentSession})}).catch(()=>{});
      }
      this.abas = this.abas.filter(a=>a.id!==id);
      if(this.ativa === id) this.ativa = this.abas[0]?.id || null;
      if(!this.abas.length) this.nova();
      this.render();
    },
    selecionar(id){
      this.ativa = id;
      this.render();
    },
    atual(){ return this.abas.find(a=>a.id===this.ativa); },

    render(){
      this.renderTabs();
      this.renderOutput();
      this.renderInput();
    },
    renderTabs(){
      const bar = document.getElementById('termTabsBar');
      if(!bar) return;
      bar.innerHTML = this.abas.map(a => `
        <div class="term-tab ${a.id===this.ativa?'active':''}" onclick="TabState.selecionar('${a.id}')">
          <div class="term-tab-status ${a.status}"></div>
          <span>${a.nome}</span>
          <span class="term-tab-close" onclick="event.stopPropagation();TabState.fechar('${a.id}')">×</span>
        </div>
      `).join('') + `<div class="term-tab-add" onclick="TabState.nova()" title="Nova aba (Ctrl+T)">+</div>`;
    },
    renderOutput(){
      const term = document.getElementById('terminal');
      if(!term) return;
      const aba = this.atual();
      term.innerHTML = '';
      if(!aba) return;
      aba.output.forEach(({texto, classe}) => {
        const linha = document.createElement('div');
        linha.className = 'term-line ' + classe;
        if(classe === 't-cmd' && texto.startsWith('$ ')){
          const cmd = texto.slice(2);
          const path = (typeof abaAtiva!=='undefined' && abaAtiva && abaAtiva!=='__painel__') ? '~/'+abaAtiva : '~';
          linha.innerHTML = `<span class="term-prompt">shield</span><span class="term-at">@</span><span class="term-host">warwin</span>:<span class="term-path">${path}</span>$ <span style="color:#e6e6e6">${cmd.replace(/</g,'&lt;')}</span>`;
        } else {
          linha.textContent = texto;
        }
        term.appendChild(linha);
      });
      term.scrollTop = term.scrollHeight;
    },
    renderInput(){
      const inputLine = document.querySelector('.term-input-line');
      const killBtn = document.getElementById('termKillBtn');
      if(!inputLine) return;
      const aba = this.atual();
      if(aba && aba.esperandoInput){
        inputLine.classList.add('waiting-input');
      } else {
        inputLine.classList.remove('waiting-input');
      }
      if(killBtn){
        if(aba && aba.status === 'running'){ killBtn.classList.add('show'); }
        else { killBtn.classList.remove('show'); }
      }
    },

    addLog(texto, classe){
      const aba = this.atual();
      if(!aba) return;
      aba.output.push({texto, classe: classe || 't-cmd'});
      if(aba.output.length > 1000) aba.output.shift();
      this.renderOutput();
    }
  };
  window.TabState = TabState;

  function upgradeAbas(){
    const wrap = document.querySelector('.terminal-wrap');
    if(!wrap) return setTimeout(upgradeAbas, 200);
    if(document.getElementById('termTabsBar')) return; // já aplicado

    // Adiciona barra de abas antes do header
    const tabsBar = document.createElement('div');
    tabsBar.className = 'term-tabs-bar';
    tabsBar.id = 'termTabsBar';
    wrap.insertBefore(tabsBar, wrap.firstChild);

    // Adiciona botão kill na linha de input
    const inputLine = wrap.querySelector('.term-input-line');
    if(inputLine && !document.getElementById('termKillBtn')){
      const killBtn = document.createElement('button');
      killBtn.id = 'termKillBtn';
      killBtn.className = 'term-kill-btn';
      killBtn.textContent = '⏹ Parar';
      killBtn.onclick = () => {
        const aba = TabState.atual();
        if(aba && aba.currentSession){
          fetch('/cmd-kill', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sessionId:aba.currentSession})});
          TabState.addLog('^C (cancelado)', 't-muted');
          aba.status = 'idle';
          aba.currentSession = null;
          aba.esperandoInput = false;
          TabState.render();
        }
      };
      inputLine.insertBefore(killBtn, inputLine.querySelector('.term-run-btn'));
    }

    // Cria primeira aba
    if(!TabState.abas.length) TabState.nova('main');

    // Atalho Ctrl+T = nova aba, Ctrl+W = fechar aba
    document.addEventListener('keydown', e => {
      if((e.ctrlKey || e.metaKey) && e.key === 't' && document.activeElement?.id === 'termInput'){
        e.preventDefault(); TabState.nova();
      }
      if((e.ctrlKey || e.metaKey) && e.key === 'w' && document.activeElement?.id === 'termInput'){
        e.preventDefault();
        if(TabState.ativa) TabState.fechar(TabState.ativa);
      }
    });

    // Substitui addLog global pra usar TabState
    window.addLog = (texto, classe) => TabState.addLog(texto, classe);

    // Substitui executarComando pra streaming
    window.executarComando = window.executarComandoPro = function(){
      const input = document.getElementById('termInput');
      const cmd = input.value.trim();
      if(!cmd) return;

      const aba = TabState.atual();
      if(!aba) return;

      // Se tá esperando input, manda como stdin
      if(aba.esperandoInput && aba.currentSession){
        input.value = '';
        TabState.addLog('> ' + cmd, 't-info');
        fetch('/cmd-stdin', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({sessionId: aba.currentSession, input: cmd})
        });
        aba.esperandoInput = false;
        TabState.render();
        return;
      }

      input.value = '';
      aba.hist.push(cmd);
      if(aba.hist.length > 100) aba.hist.shift();
      localStorage.setItem('term_hist_'+aba.id, JSON.stringify(aba.hist));
      aba.histIdx = aba.hist.length;

      TabState.addLog('$ ' + cmd, 't-cmd');

      // Comandos locais (não vão pro servidor)
      if(cmd === 'clear' || cmd === 'cls'){ aba.output = []; TabState.render(); return; }
      if(cmd === 'help'){
        ['Comandos disponíveis:',
         '  help              — esta ajuda',
         '  clear / cls       — limpa terminal',
         '  ls projetos       — lista projetos',
         '  npm install <pkg> — instala pacote (com progresso ao vivo!)',
         '  node <arquivo>    — executa node',
         '  python3 <arquivo> — executa python',
         '  ▶ Executar        — roda arquivo aberto',
         '',
         'Atalhos: ↑/↓ histórico · Tab autocomplete · Ctrl+L limpar',
         '         Ctrl+T nova aba · Ctrl+W fechar aba · ⏹ Parar comando rodando',
         '',
         'Novo: comandos rodam em STREAMING (vê saída em tempo real)',
         '       e suportam STDIN (responde quando o programa pergunta)'
        ].forEach(l => TabState.addLog(l, 't-muted'));
        return;
      }
      if(cmd === 'ls projetos'){
        fetch('/projetos/listar').then(r=>r.json()).then(d=>{
          if(!d.length) TabState.addLog('  (nenhum projeto)', 't-muted');
          else d.forEach(p => TabState.addLog('  📁 ' + p.nome + '  ·  ' + p.tipo, 't-info'));
        });
        return;
      }

      // Streaming via SSE
      const sessionId = 's' + Date.now() + Math.random().toString(36).slice(2,7);
      aba.currentSession = sessionId;
      aba.status = 'running';
      TabState.render();

      fetch('/cmd-stream', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({cmd, projeto: (typeof abaAtiva!=='undefined' && abaAtiva!=='__painel__') ? abaAtiva : null, sessionId})
      }).then(async response => {
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        while(true){
          const {done, value} = await reader.read();
          if(done) break;
          buffer += decoder.decode(value, {stream:true});
          const linhas = buffer.split('\n\n');
          buffer = linhas.pop();
          for(const linha of linhas){
            if(!linha.startsWith('data: ')) continue;
            try {
              const ev = JSON.parse(linha.slice(6));
              if(ev.type === 'stdout'){
                TabState.addLog(ev.text, 't-stdout');
                // Detecta prompt esperando input (heurística simples)
                if(/[?:]\s*$/.test(ev.text) && !ev.text.includes('http')){
                  aba.esperandoInput = true;
                  TabState.render();
                }
              } else if(ev.type === 'stderr'){
                TabState.addLog(ev.text, 't-stderr');
              } else if(ev.type === 'error'){
                TabState.addLog('✗ ' + ev.text, 't-err');
              } else if(ev.type === 'end'){
                aba.status = ev.code === 0 ? 'idle' : 'error';
                aba.currentSession = null;
                aba.esperandoInput = false;
                TabState.addLog(`─── processo terminou (código ${ev.code}) ───`, ev.code===0?'t-exit ok':'t-exit fail');
                TabState.render();
              }
            } catch(e){}
          }
        }
      }).catch(e => {
        TabState.addLog('✗ ' + e.message, 't-err');
        aba.status = 'error';
        aba.currentSession = null;
        TabState.render();
      });
    };

    // Substitui histórico para usar a aba atual
    const inputEl = document.getElementById('termInput');
    if(inputEl){
      // Remove listeners antigos clonando
      const novoInput = inputEl.cloneNode(true);
      inputEl.parentNode.replaceChild(novoInput, inputEl);
      novoInput.addEventListener('keydown', function(e){
        const aba = TabState.atual();
        if(!aba) return;
        if(e.key === 'ArrowUp'){
          e.preventDefault();
          if(!aba.hist.length) return;
          aba.histIdx = Math.max(0, aba.histIdx-1);
          this.value = aba.hist[aba.histIdx] || '';
          setTimeout(()=>this.setSelectionRange(this.value.length,this.value.length),0);
        } else if(e.key === 'ArrowDown'){
          e.preventDefault();
          aba.histIdx = Math.min(aba.hist.length, aba.histIdx+1);
          this.value = aba.hist[aba.histIdx] || '';
        } else if(e.key === 'Tab'){
          e.preventDefault();
          const v = this.value.trim();
          if(!v) return;
          const cands = ['help','clear','ls','pwd','npm install','npm run','npm start','node','python3','g++','java','cat','echo','mkdir','ls projetos'];
          const m = cands.find(c => c.startsWith(v));
          if(m) this.value = m + ' ';
        } else if(e.key === 'Enter'){
          window.executarComando();
        } else if((e.ctrlKey || e.metaKey) && e.key === 'l'){
          e.preventDefault();
          if(aba){ aba.output = []; TabState.render(); }
        }
      });
    }
  }

  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', upgradeAbas);
  } else {
    upgradeAbas();
  }
})();
</script>
